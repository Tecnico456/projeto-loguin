<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loguin</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-query.css">

</head>
<body>
    <main>
        <section id="loguin">
            <div id="imagem">
                
            </div>
            <div id="frmulario">
            <h1>Loguin</h1>
                <p>Seja bem-vindo(a) novamente. Faça loguin para acessar sua conta e poder fazer as configurações no seu ambiente.</p>
                 <form action="loguin.php" method="post" autocomplete="on">
                    <div class="campo">
                        <i class="material-icons">person</i>
                        <input type="email" name="loguin" id="iloguin" placeholder="seu e-mail" autocomplete="email" required maxlength="30">
                        <label for="iloguin">Loguin</label>
                    </div>
                    <div class="campo">
                        <i class="material-icons">face</i>
                        <input type="password" name="senha" id="isenha" placeholder="sua senha" autocomplete="current-password" required minlength="8" maxlength="20">
                        <label for="isenha">vpn_key</label>
                    </div>
                    <input type="submit" value="Entrar">
                    <a href="esqueci.html">Esqueci a Senha <i class="material-icons">mail</i>

                    </a>
                 </form>
</div>
        </section>
    </main>
</body>
</html>
